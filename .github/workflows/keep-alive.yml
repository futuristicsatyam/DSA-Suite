name: Keep API Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes, 24/7
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://dsa-suite.onrender.com/api/v1/health)
          echo "Health check status: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: health check returned $response"
            exit 1
          fi
